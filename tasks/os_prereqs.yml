---
# The role runs as root, so no docker-group membership is needed to get the
# pipeline up. If you want sudo-less `docker` for a human operator, add that
# user to the `docker` group out-of-band.
- name: Tune vm.max_map_count for OpenSearch
  ansible.posix.sysctl:
    name: vm.max_map_count
    value: "{{ pssid_vm_max_map_count }}"
    sysctl_file: /etc/sysctl.d/99-pssid-opensearch.conf
    sysctl_set: true
    reload: true
    state: present
