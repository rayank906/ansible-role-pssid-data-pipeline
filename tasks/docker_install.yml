---
- name: Install apt prerequisites for the Docker repository
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Add Docker apt GPG key
  ansible.builtin.get_url:
    url: "{{ pssid_docker_apt_gpg_url }}"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false
  become: true

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}
      signed-by=/etc/apt/keyrings/docker.asc]
      {{ pssid_docker_apt_repo_url }}
      {{ ansible_facts['distribution_release'] }} stable
    filename: docker
    state: present
  become: true

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name: "{{ pssid_docker_packages }}"
    state: present
    update_cache: true
  become: true

- name: Ensure Docker is enabled and running
  ansible.builtin.systemd_service:
    name: docker
    enabled: true
    state: started
  become: true
