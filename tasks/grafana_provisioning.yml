---
# Provisioning files are read by the Grafana container (uid 472) through a
# read-only bind mount, so root-owned + world-readable is all that is needed.
- name: Render the OpenSearch datasource provisioning file
  ansible.builtin.template:
    src: grafana/provisioning/datasources/opensearch.yml.j2
    dest: "{{ pssid_pipeline_dir }}/grafana/provisioning/datasources/opensearch.yml"
    mode: "0644"

- name: Render the dashboard provider provisioning file
  ansible.builtin.template:
    src: grafana/provisioning/dashboards/dashboards.yml.j2
    dest: "{{ pssid_pipeline_dir }}/grafana/provisioning/dashboards/dashboards.yml"
    mode: "0644"

# The shipped dashboard hardcodes two datasource UIDs. Rewrite them to the UID we
# provision, so every panel resolves on first load. This must happen as part of
# writing the file: a copy followed by an in-place `replace` would churn forever
# (copy restores the stale UIDs, replace rewrites them, every single run).
- name: Install the pSSID dashboard with the provisioned datasource UID
  ansible.builtin.copy:
    content: >-
      {{ lookup('file', 'grafana/dashboards/example-dashboard.json')
         | regex_replace('"uid":\s*"(' ~ (pssid_grafana_dashboard_stale_uids | join('|')) ~ ')"',
                         '"uid": "' ~ pssid_grafana_datasource_uid ~ '"') }}
    dest: "{{ pssid_pipeline_dir }}/grafana/dashboards/example-dashboard.json"
    mode: "0644"
