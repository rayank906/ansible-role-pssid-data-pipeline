---
# Provisioning files are read by the Grafana container (uid 472) through a
# read-only bind mount, so root-owned + world-readable is all that is needed.
- name: Render the OpenSearch datasource provisioning file
  ansible.builtin.template:
    src: grafana/provisioning/datasources/opensearch.yml.j2
    dest: "{{ pssid_pipeline_dir }}/grafana/provisioning/datasources/opensearch.yml"
    mode: "0644"

- name: Render the dashboard provider provisioning file
  ansible.builtin.template:
    src: grafana/provisioning/dashboards/dashboards.yml.j2
    dest: "{{ pssid_pipeline_dir }}/grafana/provisioning/dashboards/dashboards.yml"
    mode: "0644"

- name: Copy the pSSID example dashboard into place
  ansible.builtin.copy:
    src: grafana/dashboards/example-dashboard.json
    dest: "{{ pssid_pipeline_dir }}/grafana/dashboards/example-dashboard.json"
    mode: "0644"

- name: Normalize hardcoded OpenSearch datasource UIDs in the dashboard JSON
  ansible.builtin.replace:
    path: "{{ pssid_pipeline_dir }}/grafana/dashboards/example-dashboard.json"
    regexp: '"uid":\s*"{{ item }}"'
    replace: '"uid": "{{ pssid_grafana_datasource_uid }}"'
  loop: "{{ pssid_grafana_dashboard_stale_uids }}"
