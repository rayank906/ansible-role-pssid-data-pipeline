---
- name: Stage the esnet-matrix-panel Grafana plugin
  ansible.builtin.copy:
    src: plugins/esnet-matrix-panel
    dest: "{{ pssid_pipeline_dir }}/plugins/"
    mode: "0755"
  become: true

- name: Set ownership/permissions on the plugins directory for the Grafana container UID
  ansible.builtin.file:
    path: "{{ pssid_pipeline_dir }}/plugins"
    state: directory
    owner: "472"
    group: "472"
    mode: "0755"
    recurse: true
  become: true
