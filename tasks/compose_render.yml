---
# Secrets are inlined into the compose environment: blocks (mode 0600, root-owned)
# so no separate .env file is needed (the role runs as root).
# nginx/conf.d/grafana.conf is NOT rendered here - it depends on the cert-present
# fact and is handled in https_certbot.yml.
- name: Render Docker Compose files
  ansible.builtin.template:
    src: "compose/{{ item }}.j2"
    dest: "{{ pssid_pipeline_dir }}/{{ item }}"
    mode: "0600"
  loop:
    - opensearch-one-node.yml
    - logstash.yml
    - grafana.yml
    - opensearch-dashboard.yml
