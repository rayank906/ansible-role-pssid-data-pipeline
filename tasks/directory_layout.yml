---
# Everything here is created root-owned. Containers read these paths via bind
# mounts, so world-readable modes are sufficient. The one exception is the
# plugins directory, which Grafana (uid 472) must write to - see grafana_plugins.yml.
- name: Create the pipeline directory tree
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ pssid_pipeline_dir }}"
    - "{{ pssid_pipeline_dir }}/logstash-pipeline"
    - "{{ pssid_pipeline_dir }}/plugins"
    - "{{ pssid_pipeline_dir }}/grafana/provisioning/datasources"
    - "{{ pssid_pipeline_dir }}/grafana/provisioning/dashboards"
    - "{{ pssid_pipeline_dir }}/grafana/dashboards"

- name: Create the nginx/certbot directory tree
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ pssid_pipeline_dir }}/nginx/conf.d"
    - "{{ pssid_pipeline_dir }}/nginx/certbot-www"
    - "{{ pssid_pipeline_dir }}/nginx/letsencrypt"
  when: pssid_enable_https | bool

- name: Export OpenSearch env vars for operator troubleshooting
  ansible.builtin.template:
    src: profile.d/pssid-data-pipeline.sh.j2
    dest: /etc/profile.d/pssid-data-pipeline.sh
    mode: "0644"
  when: pssid_export_shell_env | bool
