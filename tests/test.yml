---
# Minimal test play for ansible-role-pssid-data-pipeline.
#   ansible-galaxy collection install -r ../requirements.yml
#   ansible-playbook test.yml \
#       -e pssid_opensearch_password='TestPass123!' --ask-become-pass
#
# HTTPS is left OFF here so the test needs no public DNS or Let's Encrypt.
- name: Test pSSID data pipeline role
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    pssid_pipeline_hostname: "{{ ansible_default_ipv4.address | default('localhost') }}"
    pssid_enable_https: false
    pssid_enable_opensearch_dashboards: false

  roles:
    - role: ansible-role-pssid-data-pipeline
